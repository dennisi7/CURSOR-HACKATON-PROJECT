services:
  db:
    image: postgres:16-alpine
    container_name: classbridge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: classbridge
    ports:
      - "5432:5432"
    volumes:
      - classbridge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d classbridge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  classbridge_pgdata:
